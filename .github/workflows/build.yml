name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libreoffice-dev
        pip3 install --user --upgrade buildozer virtualenv "Cython==0.29.33"

    - name: Generate default buildozer.spec if missing
      run: |
        if [ ! -f buildozer.spec ]; then
          ~/.local/bin/buildozer init
          sed -i 's/title = My Application/title = Masikprativedan Autofiller/' buildozer.spec
          sed -i 's/package.name = myapp/package.name = masikprativedan/' buildozer.spec
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
        fi

    - name: Build Android APK
      run: |
        export PATH=$PATH:~/.local/bin
        yes | buildozer android debug
      env:
        PLAYSTORE_RELEASE: "No"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Masikprativedan-Autofiller-APK
        path: bin/*.apk
