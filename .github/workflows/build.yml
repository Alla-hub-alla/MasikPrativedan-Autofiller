name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libreoffice-dev cmake
        pip3 install --user --upgrade "buildozer==1.5.0" "Cython==0.29.33" virtualenv

    - name: Configure Buildozer
      run: |
        export PATH=$PATH:~/.local/bin
        buildozer init
        sed -i 's/title = My Application/title = Masikprativedan Autofiller/' buildozer.spec
        sed -i 's/package.name = myapp/package.name = masikprativedan/' buildozer.spec
        sed -i 's/.*android.accept_sdk_license.*/android.accept_sdk_license = True/' buildozer.spec
        
        # यही वो 'मज़बूत ताले' हैं जो मैं पिछली बार भूल गया था!
        # यह गिटहब को नया और खराब NDK 28c डाउनलोड करने से रोकेगा।
        sed -i 's/^# android.ndk =.*/android.ndk = 25b/' buildozer.spec
        sed -i 's/^# android.api =.*/android.api = 33/' buildozer.spec
        sed -i 's/^# android.minapi =.*/android.minapi = 24/' buildozer.spec
        sed -i 's/^# android.ndk_api =.*/android.ndk_api = 21/' buildozer.spec

    - name: Build Android APK
      run: |
        export PATH=$PATH:~/.local/bin
        yes | buildozer android debug
      env:
        PLAYSTORE_RELEASE: "No"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Masikprativedan-Autofiller-APK
        path: bin/*.apk
