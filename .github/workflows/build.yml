name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Create App Settings
      run: |
        pip install buildozer
        buildozer init
        sed -i 's/.*android.accept_sdk_license.*/android.accept_sdk_license = True/' buildozer.spec
        sed -i 's/title = My Application/title = Masikprativedan Autofiller/' buildozer.spec
        sed -i 's/package.name = myapp/package.name = masikprativedan/' buildozer.spec

    - name: VIP Buildozer Action (Sealed Docker)
      uses: ArtemSBulgakov/buildozer-action@v1
      id: buildozer
      with:
        command: buildozer android debug
        buildozer_version: master

    - name: Upload Final APK
      uses: actions/upload-artifact@v4
      with:
        name: Masikprativedan-APK
        path: bin/*.apk
